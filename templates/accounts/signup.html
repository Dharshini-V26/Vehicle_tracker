{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Sign Up - Smart Tracker{% endblock %}

{% block landing_content %}
<div class="hero-section" style="min-height: 100vh;">
    <div class="container h-100 d-flex align-items-center justify-content-center py-5">
        <div class="col-md-6" data-aos="zoom-in">
            <div class="card p-5 shadow-lg border-0 bg-white bg-opacity-95 rounded-4 animate__animated animate__fadeInUp">
                <div class="text-center mb-4">
                    <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
                        <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                    </div>
                    <h2 class="fw-bold">Create Account</h2>
                    <p class="text-muted">Join the smart way of vehicle management.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-premium btn-lg">Create Account</button>
                    </div>
                </form>
                <div class="text-center mt-4">
                    <p class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Login here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
